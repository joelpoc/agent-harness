adversarial: false
description: Budget ceiling is enforced by the shell — not by the model
expected_policy_decisions:
  describe_schema: ALLOW
  query_data: ALLOW
id: 005_budget_enforced_deny
notes: 'This case validates that budget.check() is called before each model turn.
  In CI with a $0.001 budget, the loop should halt with [Budget exceeded] after the
  first turn. The policy engine still allows the tools — the shell''s budget hook
  is the enforcer.

  '
recorded_response:
  final_answer: 'Here is a full cost analysis for the last 90 days:


    **Total Cost:** $66,375.98


