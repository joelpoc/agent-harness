description: Agent uses describe_schema before querying billing data
expected_policy_decisions:
  describe_schema: ALLOW
  query_data: ALLOW
expected_sql_pattern: SELECT.*project_id.*SUM.*cost_usd.*GROUP BY.*ORDER BY.*LIMIT
  3
expected_tool_calls:
- tool: query_data
- tool: describe_schema
- tool: query_data
id: 001_schema_query
recorded_response:
  final_answer: 'The top 3 GCP projects by cost last month were:


    1.  **data-ingestion**: $5942.37

    2.  **analytics-prod**: $5763.63

    3.  **backend-api**: $5330.75'
  model: null
  tool_calls:
  - args:
      sql: "SELECT\n  project.name,\n  SUM(cost) AS total_cost\nFROM\n  gcp_billing_export\n\
        WHERE\n  date >= DATE_TRUNC('month', CURRENT_DATE - INTERVAL '1 month') AND\
        \ date < DATE_TRUNC('month', CURRENT_DATE)\nGROUP BY\n  project.name\nORDER\
        \ BY\n  total_cost DESC\nLIMIT 3;"
    tool: query_data
  - args:
      table_name: gcp_billing_export
    tool: describe_schema
  - args:
      sql: "SELECT\n  project_id,\n  SUM(cost_usd) AS total_cost\nFROM\n  gcp_billing_export\n\
        WHERE\n  date >= DATE_TRUNC('month', CURRENT_DATE - INTERVAL '1 month') AND\
        \ date < DATE_TRUNC('month', CURRENT_DATE)\nGROUP BY\n  project_id\nORDER\
        \ BY\n  total_cost DESC\nLIMIT 3;"
    tool: query_data
user_message: What are the top 3 GCP projects by cost last month?
