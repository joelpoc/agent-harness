# Harness policy — deny-by-default
# Evaluated in order; first match wins.
# MCP tools get stricter limits by default.

default: DENY

tools:
  # Safe read-only tools
  - pattern: echo
    decision: ALLOW
    reason: "Test tool — always safe"

  - pattern: describe_schema
    decision: ALLOW
    reason: "Read-only schema introspection"

  - pattern: query_data
    decision: ALLOW
    reason: "Read-only SQL queries"
    require_read_only_sql: true

  - pattern: generate_report
    decision: ALLOW
    reason: "Output formatting — no side effects"

  # High-risk tools requiring human approval
  - pattern: create_ticket
    decision: REQUIRE_APPROVAL
    reason: "Creates external side effects — requires human sign-off"

  # GitHub MCP — whitelist: only create_issues is permitted
  # All other GitHub tools are DENY (real trust boundary; see ADR 008)
  - pattern: mcp/github/issue_write
    decision: REQUIRE_APPROVAL
    reason: "GitHub issue creation — real external side effect, human approval required"

  - pattern: mcp/github/*
    decision: DENY
    reason: "GitHub MCP tool not in whitelist — deny-by-default at trust boundary"

  # All other MCP tools require approval (belt-and-suspenders for external transport)
  - pattern: mcp/*
    decision: REQUIRE_APPROVAL
    reason: "All MCP tools require explicit human approval (external transport)"
