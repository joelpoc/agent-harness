name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: mypy (harness/ strict)
        run: uv run mypy harness/

  unit-tests:
    name: Unit Tests (BLOCKING)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short
        # These MUST pass. They prove the shell's deterministic guarantees.

  evals:
    name: Evals (BLOCKING — recorded responses only)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run evals
        run: uv run pytest evals/ -v --tb=short
        # Runs against recorded responses — no live API calls in CI.

  judge-metrics:
    name: Judge Metrics — Phoenix Evals (NON-BLOCKING)
    runs-on: ubuntu-latest
    needs: evals
    continue-on-error: true  # Non-blocking — informs, never gates
    env:
      DEFAULT_MODEL: ${{ secrets.DEFAULT_MODEL || 'gemini/gemini-2.5-pro' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run Phoenix judge metrics
        run: uv run python evals/run_judge_metrics.py
        # Requires GEMINI_API_KEY secret. Skips gracefully if not set.
        # CI proves the shell with asserts; Phoenix measures the core with experiments.
      - name: Write job summary
        if: always()
        run: |
          uv run python - <<'EOF'
          import json, pathlib, os
          report_path = pathlib.Path("evals/judge_report.json")
          if not report_path.exists():
              print("No judge_report.json found — skipping summary")
              exit(0)
          report = json.loads(report_path.read_text())
          summary = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          lines = ["## Judge Metrics (LLM-as-judge, non-blocking)\n"]
          lines.append(f"**Judge model:** `{report.get('judge_model', 'unknown')}`  ")
          lines.append(f"**Mode:** {report.get('mode', 'offline')}  ")
          lines.append(f"**Cases evaluated:** {report.get('cases_evaluated', 0)}\n")
          lines.append("| Metric | Pass rate | Passed | Total |")
          lines.append("|--------|-----------|--------|-------|")
          for m in report.get("metrics", []):
              if "pass_rate" in m:
                  pct = f"{m['pass_rate']*100:.1f}%"
                  icon = "✅" if m["pass_rate"] >= 0.8 else "⚠️"
                  lines.append(f"| {m['metric']} | {icon} {pct} | {m['passed']} | {m['total']} |")
              else:
                  reason = m.get("error") or m.get("skipped", "unknown")
                  lines.append(f"| {m['metric']} | ⏭ SKIPPED | — | — |")
                  lines.append(f"> {reason}")
          lines.append("\n> These metrics inform — they never gate CI.")
          summary.write_text("\n".join(lines))
          EOF
      - name: Upload judge report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-report
          path: evals/judge_report.json
          if-no-files-found: ignore
