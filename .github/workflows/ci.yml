name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: mypy (harness/ strict)
        run: uv run mypy harness/

  unit-tests:
    name: Unit Tests (BLOCKING)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short
        # These MUST pass. They prove the shell's deterministic guarantees.

  evals:
    name: Evals (BLOCKING — recorded responses only)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run evals
        run: uv run pytest evals/ -v --tb=short
        # Runs against recorded responses — no live API calls in CI.

  judge-metrics:
    name: Judge Metrics (NON-BLOCKING)
    runs-on: ubuntu-latest
    needs: evals
    continue-on-error: true  # Non-blocking — informs, never gates
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: DeepEval metrics
        run: echo "DeepEval judge metrics — non-blocking placeholder"
        # TODO M5: uv run python evals/run_judge_metrics.py
