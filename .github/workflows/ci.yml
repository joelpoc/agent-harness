name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  lint-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: mypy (harness/ strict)
        run: uv run mypy harness/

  unit-tests:
    name: Unit Tests (BLOCKING)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run unit tests
        run: uv run pytest tests/ -v --tb=short
        # These MUST pass. They prove the shell's deterministic guarantees.

  evals:
    name: Evals (BLOCKING — recorded responses only)
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run evals
        run: uv run pytest evals/ -v --tb=short
        # Runs against recorded responses — no live API calls in CI.

  judge-metrics:
    name: Judge Metrics — Phoenix Evals (NON-BLOCKING)
    runs-on: ubuntu-latest
    needs: evals
    continue-on-error: true  # Non-blocking — informs, never gates
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run Phoenix judge metrics
        run: uv run python evals/run_judge_metrics.py
        # Requires GEMINI_API_KEY or DEFAULT_MODEL. Skips gracefully if no recorded cases.
        # CI proves the shell with asserts; Phoenix measures the core with experiments.
      - name: Upload judge report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: judge-report
          path: evals/judge_report.json
          if-no-files-found: ignore
